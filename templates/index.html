```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TradingBot V4</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <header class="header">

        <h1>🤖 TradingBot V4</h1>

        <div class="status online">
            ● ONLINE
        </div>

    </header>

    <section class="cards">

        <div class="card">
            <h3>💰 Balance</h3>
            <p id="balance">--</p>
        </div>

        <div class="card">
            <h3>📈 Session PnL</h3>
            <p id="pnl">--</p>
        </div>

        <div class="card">
            <h3>🎯 Win Rate</h3>
            <p id="wr">--</p>
        </div>

        <div class="card">
            <h3>📊 Trades</h3>
            <p id="trades">--</p>
        </div>

    </section>

    <section class="panel">

        <h2>📌 Open Positions</h2>

        <div id="positions">

            No Open Positions

        </div>

    </section>

    <section class="panel">

        <h2>❤️ System Health</h2>

        <table>

            <tr>
                <td>CPU</td>
                <td id="cpu">--</td>
            </tr>

            <tr>
                <td>RAM</td>
                <td id="ram">--</td>
            </tr>

            <tr>
                <td>Uptime</td>
                <td id="uptime">--</td>
            </tr>

            <tr>
                <td>Bot</td>
                <td id="botstatus">ONLINE</td>
            </tr>

        </table>

    </section>

    <section class="buttons">

        <button id="startBtn">
            ▶ START
        </button>

        <button id="stopBtn">
            ⏹ STOP
        </button>

        <button id="restartBtn">
            🔄 RESTART
        </button>

        <button id="logsBtn">
            📄 LOGS
        </button>

    </section>

    <section class="panel">

        <h2>📉 Equity Curve</h2>

        <div class="placeholder">

            Coming Soon

        </div>

    </section>

    <section class="panel">

        <h2>🧾 Recent Trades</h2>

        <div class="placeholder">

            Coming Soon

        </div>

    </section>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>

</html>
```
